[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "resq-dsa"
version = "1.3.4"
description = "Production-grade data structures and algorithms — zero dependencies"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
readme = "README.md"
authors = [{ name = "ResQ Software" }]
keywords = ["dsa", "bloom-filter", "graph", "trie", "algorithms"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Libraries",
  "Typing :: Typed",
]
dependencies = []

[project.urls]
Repository = "https://github.com/resq-software/pypi"
Changelog = "https://github.com/resq-software/pypi/blob/main/packages/resq-dsa/CHANGELOG.md"
Issues = "https://github.com/resq-software/pypi/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/resq_dsa"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "SIM", "RUF"]

[tool.mypy]
strict = true
python_version = "3.11"

[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
branch = "main"
changelog_file = "CHANGELOG.md"
build_command = "pip install build && python -m build"
commit_message = "chore(release): resq-dsa {version}"

[tool.semantic_release.commit_parser_options]
allowed_tags = ["feat", "fix", "perf", "refactor", "docs", "test", "chore"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]

[dependency-groups]
dev = [
  "pytest>=9.0.2",
  "ruff>=0.4.0",
  "mypy>=1.10.0",
  "big-o>=0.11.0",
]
