name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  lint:
    name: Lint (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: resq-mcp
            dir: packages/resq-mcp
          - name: resq-dsa
            dir: packages/resq-dsa
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync
        working-directory: ${{ matrix.dir }}
      - run: uv run ruff check src/ tests/
        working-directory: ${{ matrix.dir }}
      - run: uv run ruff format --check src/ tests/
        working-directory: ${{ matrix.dir }}

  typecheck:
    name: Type Check (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: resq-mcp
            dir: packages/resq-mcp
          - name: resq-dsa
            dir: packages/resq-dsa
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync
        working-directory: ${{ matrix.dir }}
      - run: uv run mypy src/
        working-directory: ${{ matrix.dir }}

  test:
    name: Test (${{ matrix.name }} / ${{ matrix.python-version }})
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name: [resq-mcp, resq-dsa]
        python-version: ["3.11", "3.12", "3.13"]
        include:
          - name: resq-mcp
            dir: packages/resq-mcp
            cov: --cov=src --cov-report=xml
          - name: resq-dsa
            dir: packages/resq-dsa
            cov: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync
        working-directory: ${{ matrix.dir }}
      - run: uv run pytest tests/ -v ${{ matrix.cov }}
        working-directory: ${{ matrix.dir }}

  build:
    name: Build (${{ matrix.name }})
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: resq-mcp
            dir: packages/resq-mcp
          - name: resq-dsa
            dir: packages/resq-dsa
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv build
        working-directory: ${{ matrix.dir }}
