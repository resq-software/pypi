name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv run mypy src/

  security:
    name: Security (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv run ruff check --select S --ignore S104 src/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: [lint, typecheck, security]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync
      - run: uv run pytest tests/ -v --cov=src --cov-report=xml --cov-report=html
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13' && always()
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
      - name: Upload coverage HTML report
        if: matrix.python-version == '3.13' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  build-verify:
    name: Build Verification
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv run python -m build
      - run: uv run twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t resq-mcp:test .

  test-pypi:
    name: TestPyPI Publish
    needs: [build-verify]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: test-pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Patch version for TestPyPI
        run: |
          # Inject .devN suffix into pyproject.toml BEFORE building.
          # This ensures the internal metadata matches the filename.
          # CI-only mutation — never committed.
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          sed -i "s/^version = .*/version = \"${VERSION}.dev${{ github.run_number }}\"/" pyproject.toml
      - run: uv run python -m build
      - run: uv run twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
