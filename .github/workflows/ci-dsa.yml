name: CI (resq-dsa)

on:
  push:
    branches: [main]
    paths:
      - 'packages/resq-dsa/**'
  pull_request:
    paths:
      - 'packages/resq-dsa/**'

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync
        working-directory: packages/resq-dsa
      - run: uv run ruff check src/ tests/
        working-directory: packages/resq-dsa

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync
        working-directory: packages/resq-dsa
      - run: uv run mypy src/
        working-directory: packages/resq-dsa

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync
        working-directory: packages/resq-dsa
      - run: uv run pytest tests/ -v
        working-directory: packages/resq-dsa

  build:
    name: Build Verification
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv build
        working-directory: packages/resq-dsa
