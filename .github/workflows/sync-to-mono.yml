name: Sync to Monorepo

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/**"
      - ".gitignore"

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: standalone

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: resq-software/resQ
          token: ${{ secrets.SYNC_TOKEN }}
          path: monorepo

      - name: Sync mcp → libs/python/mcp
        run: |
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            standalone/ \
            monorepo/libs/python/mcp/

      - name: Create PR in monorepo
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          STANDALONE_SHA: ${{ github.sha }}
        working-directory: monorepo
        run: |
          git config user.name  "resq-sync[bot]"
          git config user.email "sync@resq.software"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          SHORT="${STANDALONE_SHA:0:7}"
          BRANCH="sync/mcp-${SHORT}"
          git checkout -b "$BRANCH"
          git commit -m "chore(mcp): sync from resq-software/mcp@${SHORT}"
          git push origin "$BRANCH"
          gh pr create \
            --repo resq-software/resQ \
            --base main \
            --head "$BRANCH" \
            --title "chore(mcp): sync from resq-software/mcp@${SHORT}" \
            --body "Automated sync from resq-software/mcp@${STANDALONE_SHA}."
