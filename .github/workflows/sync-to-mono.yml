name: Sync to Monorepo

on:
  push:
    branches: [main]
    paths:
      - "packages/**"

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: standalone

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: resq-software/resQ
          token: ${{ secrets.SYNC_TOKEN }}
          path: monorepo

      - name: Sync mcp → libs/python/mcp
        run: |
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            standalone/packages/resq-mcp/ \
            monorepo/libs/python/mcp/

      - name: Commit and push to monorepo
        env:
          STANDALONE_SHA: ${{ github.sha }}
        working-directory: monorepo
        run: |
          git config user.name "resq-sync[bot]"
          git config user.email "sync@resq.software"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          SHORT="${STANDALONE_SHA:0:7}"
          git commit -m "chore(mcp): sync from resq-software/pypi@${SHORT}"
          git push origin main
